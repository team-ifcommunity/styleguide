<header class="styleguideContentsHeader">
  <h2 class="styleguideContentsHeaderText">Tab</h2>
  <div class="styleguideContentsHeaderActions">
    <button type="button" class="styleguideBtnCodingList">
      <svg class="svg-icon" aria-hidden="true">
        <use href="#icon-styleguide-more"></use>
      </svg>
      <span class="styleguideBtnCodingListText">Coding_list</span>
      <svg class="svg-icon" aria-hidden="true">
        <use href="#icon-styleguide-arrow-right"></use>
      </svg>
    </button>
  </div>
</header>

<div class="styleguideContentsBody">
  <section class="styleguideContentsSection">
    <h3 class="styleguideContentsLabel">tab-area (시스템)</h3>

    <div class="styleguideResultBody">
      <div class="styleguideResultFrame">
        <div class="styleguideRowItem">
          <h4 class="styleguideRowItemLabel">탭</h4>
          <div class="tab-area" style="width: 500px">
            <div class="tab-list">
              <ul role="tablist" aria-label="콘텐츠 선택">
                <li
                  id="sg_tab_01"
                  role="tab"
                  aria-selected="true"
                  aria-controls="sg_panel_01"
                  class="is-active"
                >
                  <button type="button" class="tab-btn">
                    <span>Tab1</span> <i class="sr-only created">선택됨</i>
                  </button>
                </li>
                <li
                  id="sg_tab_02"
                  role="tab"
                  aria-selected="false"
                  aria-controls="sg_panel_02"
                >
                  <button type="button" class="tab-btn">
                    <span>Tab2</span>
                  </button>
                </li>
                <li
                  id="sg_tab_03"
                  role="tab"
                  aria-selected="false"
                  aria-controls="sg_panel_03"
                >
                  <button type="button" class="tab-btn">
                    <span>Tab3</span>
                  </button>
                </li>
                <li
                  id="sg_tab_04"
                  role="tab"
                  aria-selected="false"
                  aria-controls="sg_panel_04"
                >
                  <button type="button" class="tab-btn">
                    <span>Tab4</span>
                  </button>
                </li>
                <li
                  id="sg_tab_05"
                  role="tab"
                  aria-selected="false"
                  aria-controls="sg_panel_05"
                >
                  <button type="button" class="tab-btn">
                    <span>Tab5</span>
                  </button>
                </li>
              </ul>
            </div>
            <div class="tab-contents">
              <section
                id="sg_panel_01"
                class="tab-panel is-active"
                aria-labelledby="sg_tab_01"
              >
                <h3 class="sr-only">Tab1 콘텐츠</h3>
                1
              </section>
              <section
                id="sg_panel_02"
                class="tab-panel"
                aria-labelledby="sg_tab_02"
                hidden
              >
                <h3 class="sr-only">Tab2 콘텐츠</h3>
                2
              </section>
              <section
                id="sg_panel_03"
                class="tab-panel"
                aria-labelledby="sg_tab_03"
                hidden
              >
                <h3 class="sr-only">Tab3 콘텐츠</h3>
                3
              </section>
              <section
                id="sg_panel_04"
                class="tab-panel"
                aria-labelledby="sg_tab_04"
                hidden
              >
                <h3 class="sr-only">Tab4 콘텐츠</h3>
                4
              </section>
              <section
                id="sg_panel_05"
                class="tab-panel"
                aria-labelledby="sg_tab_05"
                hidden
              >
                <h3 class="sr-only">Tab5 콘텐츠</h3>
                5
              </section>
            </div>
          </div>
        </div>
      </div>

      <div class="codeArea">
        <div class="codeName">
          <svg class="svg-icon" aria-hidden="true">
            <use href="#icon-styleguide-code"></use>
          </svg>
          <h4>Html</h4>
        </div>
        <pre class="hljs-sc">
                    <code class="hljs language-html"></code>
                </pre>
      </div>
    </div>
  </section>
</div>
