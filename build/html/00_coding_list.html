    <style>
      /* reset */
      html,
      body,
      div,
      span,
      object,
      h1,
      h2,
      h3,
      h4,
      h5,
      h6,
      p,
      blockquote,
      a,
      button,
      abbr,
      address,
      img,
      q,
      dl,

      ol,
      ul,

      caption,
      tbody,
      tfoot,
      thead,
      tr,
      th,
      td,
      article,
      aside,
      footer,
      header,
      section,

        padding: 0;
        border: 0;

      aside,
      details,
      figcaption,
      figure,
      footer,
      header,
      hgroup,

      body,

        height: 100%;

      ol,

        list-style: none;
      }

      table {
        border-collapse: collapse;
        border-spacing: 0;
      }

      img {
        border: none;
        vertical-align: top;
      }

      address {
        font-style: normal;
      }

      button {
        display: inline-block;
        border: none;
        background-color: transparent;
        cursor: pointer;
      }

      input,
      button,
      a,
      select,
      option {
        font-family: inherit;
        font-size: inherit;
      }

      input[type="checkbox"] {
        border: none !important;
      }

      /* for lte IE10 */
      input[type="radio"] {
        border: none !important;
      }

      /* for lte IE10 */
      caption {
        text-align: left;
        margin-bottom: 7px;
        font-size: 16px;
        font-weight: bold;
      }

      /* common */

      html,
      pre {

        font-size: 14px;
        color: #333;
        letter-spacing: -0.045em !important;

      img {

        height: auto;
      }

      html,

        width: 100%;
        height: 100%;

        border-bottom: 1px solid #ccc;
        border-left: 1px solid #ccc;
        text-align: center;
      }

      tr a:focus {
